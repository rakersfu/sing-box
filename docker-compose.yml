version: '3.8'

services:
  sing-box:
    image: your-image-name:latest
    container_name: sing-box-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - UUID=588db1b3-0b3f-48d9-98a2-c5574415a400
      - PORT=8080
      - WS_PATH=/chat
      - LISTEN_ADDR=0.0.0.0
      - SNIFF=true
      - SNIFF_OVERRIDE=true
      - LOG_LEVEL=info
